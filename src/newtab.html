<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>新标签页</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f5f0;
    color: #1a1a1a;
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 24px;
  }
  .brand-icon {
    width: 34px; height: 34px; border-radius: 8px;
    background: #fff; border: 1.5px solid #1a1a1a;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #1a1a1a;
    letter-spacing: -0.5px;
  }
  .brand-name { font-size: 15px; font-weight: 500; color: #999; }
  .clock {
    font-size: 62px; font-weight: 300;
    color: #1a1a1a; letter-spacing: -3px;
    line-height: 1; margin-bottom: 5px;
    font-variant-numeric: tabular-nums;
  }
  .date { font-size: 13px; color: #aaa; margin-bottom: 32px; }
  .pick-label {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.7px; text-transform: uppercase;
    color: #bbb; margin-bottom: 12px;
  }
  .grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 7px; width: 100%; max-width: 580px; margin-bottom: 8px;
  }
  .card {
    background: #fff; border: 1px solid #e8e8e0;
    border-radius: 10px; padding: 11px 13px;
    cursor: pointer;
    transition: border-color 0.13s, box-shadow 0.13s, transform 0.1s;
  }
  .card:hover {
    border-color: #ccc;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transform: translateY(-1px);
  }
  .card.selected {
    border-color: var(--c, #1a1a1a);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--c, #1a1a1a) 18%, transparent);
  }
  .card.default-card { border-style: dashed; }
  .extra { display: none; }
  .extra.open { display: block; }
  .card-top { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .card-name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
  .card-sub { font-size: 11px; color: #bbb; }
  .show-more {
    font-size: 12px; color: #bbb; cursor: pointer;
    padding: 5px 0; text-align: center;
    width: 100%; max-width: 580px;
    background: none; border: none;
    transition: color 0.13s; margin-bottom: 8px;
  }
  .show-more:hover { color: #666; }

  /* 选完后的提示 */
  .ready-hint {
    display: none;
    flex-direction: column; align-items: center; gap: 6px;
    margin-top: 8px;
  }
  .ready-hint.visible { display: flex; }
  .ready-badge {
    display: flex; align-items: center; gap: 7px;
    background: #fff; border: 1px solid #e0e0d8;
    border-radius: 20px; padding: 7px 14px;
    font-size: 13px; font-weight: 500; color: #1a1a1a;
  }
  .ready-dot { width: 8px; height: 8px; border-radius: 50%; }
  .ready-sub { font-size: 12px; color: #bbb; }

  .footer { display: flex; gap: 18px; margin-top: 18px; }
  .footer-btn {
    font-size: 12px; color: #ccc; cursor: pointer;
    background: none; border: none; transition: color 0.13s;
  }
  .footer-btn:hover { color: #888; }
</style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">LZQ</div>
  <span class="brand-name">SessionFox</span>
</div>

<div class="clock" id="clock">--:--</div>
<div class="date" id="date"></div>
<div class="pick-label">选择会话</div>

<div class="grid" id="grid"></div>
<button class="show-more" id="showMore" style="display:none"></button>

<!-- 选完后显示确认提示 -->
<div class="ready-hint" id="readyHint">
  <div class="ready-badge">
    <span class="ready-dot" id="readyDot"></span>
    <span id="readyName"></span>
    <span style="color:#bbb;font-weight:400">· 已就绪，在地址栏输入网址</span>
  </div>
  <div class="ready-sub">当前标签已绑定此 Session</div>
</div>

<div class="footer">
  <button class="footer-btn" id="manageBtn">管理 Session</button>
  <button class="footer-btn" id="skipBtn">跳过</button>
</div>

<script src="newtab.js"></script>
</body>
</html>
